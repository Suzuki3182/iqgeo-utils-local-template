# =============================================================================
# Dev Environment Kustomization
# =============================================================================
# Kustomize overlay for the dev environment.
# Groups all raw manifest resources for the dev deployment.
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: suzuki3182-dev

commonLabels:
  iqgeo/environment: dev
  app.kubernetes.io/managed-by: argocd

resources:
  - manifests/postgis/postgis-deployment.yaml
  - manifests/keycloak/keycloak-deployment.yaml
  - manifests/pgadmin/pgadmin-deployment.yaml
  - manifests/routes/openshift-routes.yaml
