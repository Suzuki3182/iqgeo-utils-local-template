apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: iqgeo-qa

commonLabels:
  iqgeo/environment: qa
  app.kubernetes.io/managed-by: argocd

# QA reuses dev manifests with namespace override
# Add QA-specific patches as needed
resources: []
