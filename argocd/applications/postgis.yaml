# =============================================================================
# Argo CD Application: PostGIS Database
# =============================================================================
# Manages the PostGIS database deployment from raw Kubernetes manifests
# stored in this Git repository.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgis-dev
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: iqgeo
    iqgeo/environment: dev
    iqgeo/component: database
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: iqgeo

  source:
    repoURL: "https://github.com/IQGeo/utils-project-template.git"
    targetRevision: main
    path: argocd/environments/dev/manifests/postgis

  destination:
    server: "https://kubernetes.default.svc"
    namespace: suzuki3182-dev

  syncPolicy:
    automated:
      selfHeal: true
      prune: false
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 3m

  ignoreDifferences:
    - group: ""
      kind: PersistentVolumeClaim
      jsonPointers:
        - /spec/volumeName
        - /spec/storageClassName
