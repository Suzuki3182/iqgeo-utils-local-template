# =============================================================================
# OpenShift Route for Argo CD Server UI
# =============================================================================
# Exposes the Argo CD web UI via an OpenShift Route with TLS edge termination.
# Update the host to match your cluster domain.
# =============================================================================
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: argocd-server
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-server
    app.kubernetes.io/part-of: argocd
spec:
  host: argocd-argocd.apps.rm2.thpm.p1.openshiftapps.com
  to:
    kind: Service
    name: argocd-server
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
