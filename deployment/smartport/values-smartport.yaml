# =============================================================================
# IQGeo Platform 7.4 - smartport values overlay (Helm chart v3.1.0)
# Cluster: api.53.caas.toroon12.stratus.int.bell.ca
# Namespace: smartport | UID range 1002990000 | Storage: ontap-nas-ssd
# Images: built on-cluster, pushed to internal registry (smartport/iqgeo-qa-*)
# PostGIS + Keycloak deployed separately (standalone manifests)
# =============================================================================

global:
  dnsZone: apps.53.caas.toroon12.stratus.int.bell.ca
  hostname: iqgeo-platform-smartport
  imagePrefix: iqgeo-qa
  db:
    host: postgis
    port: 5432
    name: qa
    auth:
      existingSecret: db-credentials
      usernameKey: username
      passwordKey: password
    ssl:
      enabled: false
  redisClient:
    host: ""
    port: 6379
    auth:
      enabled: true
      secretName: ""
      secretPasswordKey: ""
    handleOlderPlatformVersions: false

image:
  projectRegistry: image-registry.openshift-image-registry.svc:5000
  projectRepository: smartport
  tag: "latest"
  pullPolicy: Always
  pullSecrets:
    - name: container-registry
    - name: combined-registry
  appserver:
    repository: "image-registry.openshift-image-registry.svc:5000/smartport/iqgeo-qa-appserver"
    tag: "latest"
  tools:
    repository: "image-registry.openshift-image-registry.svc:5000/smartport/iqgeo-qa-tools"
    tag: "latest"

ingress:
  enabled: false

persistence:
  enabled: true
  storageClass: "ontap-nas-ssd"
  accessMode: ReadWriteOnce
  size: 10Gi

appserver:
  enabled: true
  replicaCount: 1
  autoscaling:
    enabled: false
  apachePort: "8080"
  sharedDirectory: "/shared-data"
  debug: false
  oidc:
    enabled: true
    insecure: true
    clientId: "iqgeo-oidc"
    clientSecret:
      secretName: "oidc-client-secret"
      secretKey: "oidc-client-secret"
    services: ["discovery","authorization","access_token","user_info","end_session","refresh_access_token"]
    responseTypes: ["code"]
    scopes: ["openid", "profile", "roles"]
    issuer: "https://keycloak-smartport.apps.53.caas.toroon12.stratus.int.bell.ca/realms/iqgeo"
  resources:
    limits:
      cpu: "2"
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 1Gi

appserverGroups:
  - name: default-appserver
    extraPodSpec: |
      initContainers:
        - name: fix-permissions
          image: image-registry.openshift-image-registry.svc:5000/smartport/iqgeo-qa-appserver:latest
          command:
            - sh
            - -c
            - |
              set +e
              cp -a /entrypoint.d/* /mnt/entrypoint.d/
              chmod -R a+rwx /mnt/entrypoint.d/
              cp -a /etc/apache2/sites-enabled/* /mnt/apache-sites/
              cp -a /opt/iqgeo/data/* /mnt/data/
              mkdir -p /mnt/config/oidc
              cp -a /opt/iqgeo/platform/WebApps/* /mnt/webapps/
              cp /usr/sbin/apache2 /mnt/apache-bin/apache2
              chmod a+rx /mnt/apache-bin/apache2
              echo "Init container completed successfully"
              exit 0
          volumeMounts:
            - name: entrypoint-scripts
              mountPath: /mnt/entrypoint.d
            - name: apache-sites
              mountPath: /mnt/apache-sites
            - name: iqgeo-data
              mountPath: /mnt/data
            - name: iqgeo-config
              mountPath: /mnt/config
            - name: webapps
              mountPath: /mnt/webapps
            - name: apache-bin
              mountPath: /mnt/apache-bin
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
    extraVolumes:
      - name: entrypoint-scripts
        emptyDir: {}
      - name: apache-sites
        emptyDir: {}
      - name: iqgeo-data
        emptyDir: {}
      - name: iqgeo-config
        emptyDir: {}
      - name: webapps
        emptyDir: {}
      - name: apache-bin
        emptyDir: {}
      - name: apache-logs
        emptyDir: {}
      - name: apache-run
        emptyDir: {}
    extraVolumeMounts:
      - name: entrypoint-scripts
        mountPath: /entrypoint.d
      - name: apache-sites
        mountPath: /etc/apache2/sites-enabled
      - name: iqgeo-data
        mountPath: /opt/iqgeo/data
      - name: iqgeo-config
        mountPath: /opt/iqgeo/config
      - name: webapps
        mountPath: /opt/iqgeo/platform/WebApps
      - name: apache-bin
        mountPath: /usr/sbin/apache2
        subPath: apache2
      - name: apache-logs
        mountPath: /var/log/apache2
      - name: apache-run
        mountPath: /var/run/apache2

workerGroups:
  - name: default-worker
    taskWorkers: 2
    taskQueues: []
    terminationGracePeriodSeconds: 300
    securityContext:
      # Pin to a UID inside the smartport namespace SCC range
      # (openshift.io/sa.scc.uid-range = 1002990000/10000). The chart's worker
      # template otherwise defaults to runAsUser: 33 (www-data), which the
      # restricted-v2 SCC rejects. The appserver group omits runAsUser and lets
      # OpenShift auto-assign; workers need it explicit to override the default.
      runAsUser: 1002990000
      runAsNonRoot: true
      readOnlyRootFilesystem: false
      allowPrivilegeEscalation: false
      seccompProfile:
        type: RuntimeDefault
      capabilities:
        drop:
          - ALL
    extraPodSpec: |
      initContainers:
        - name: fix-permissions
          image: image-registry.openshift-image-registry.svc:5000/smartport/iqgeo-qa-appserver:latest
          command:
            - sh
            - -c
            - |
              set +e
              cp -a /entrypoint.d/* /mnt/entrypoint.d/ 2>/dev/null

              # Workers run background tasks, not the OIDC-protected web UI.
              # Strip the OIDC entrypoint scripts so the worker doesn't crash
              # trying to read /opt/iqgeo/config/oidc/conf.json (only the
              # appserver provisions that file).
              rm -f /mnt/entrypoint.d/231-oidc-config.sh 2>/dev/null
              rm -f /mnt/entrypoint.d/270_adjust_oidc_conf.sh 2>/dev/null

              # The stock 910_start_worker.sh backgrounds "myw_task start &" and
              # returns, so on a dedicated worker container the entrypoint loop
              # finishes and the container exits 0 (killing the worker). Rewrite
              # it to run the worker in the FOREGROUND so the container stays
              # alive and the pod is the long-running task daemon.
              cat > /mnt/entrypoint.d/910_start_worker.sh <<'WORKEOF'
              #! /bin/bash -e
              if [[ -n "${MYW_TASK_WORKERS}" && "${MYW_TASK_WORKERS}" -gt 0 ]]; then
                  command="myw_task start --workers ${MYW_TASK_WORKERS}"
                  if [[ -n "${MYW_TASK_QUEUES}" ]]; then
                      command+=" --queues ${MYW_TASK_QUEUES}"
                  fi
                  exec $command
              fi
              WORKEOF

              chmod -R 777 /mnt/entrypoint.d/ 2>/dev/null

              cp -a /opt/iqgeo/platform/WebApps/* /mnt/webapps/ 2>/dev/null
              cp -a /opt/iqgeo/data/* /mnt/data/ 2>/dev/null
              cp -a /etc/apache2/sites-enabled/* /mnt/apache-sites/ 2>/dev/null
              cp /usr/sbin/apache2 /mnt/apache-bin/apache2 2>/dev/null
              chmod a+rx /mnt/apache-bin/apache2 2>/dev/null
              exit 0
          volumeMounts:
            - name: entrypoint-scripts
              mountPath: /mnt/entrypoint.d
            - name: webapps
              mountPath: /mnt/webapps
            - name: iqgeo-data
              mountPath: /mnt/data
            - name: apache-sites
              mountPath: /mnt/apache-sites
            - name: apache-bin
              mountPath: /mnt/apache-bin
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
    extraVolumes:
      - name: entrypoint-scripts
        emptyDir: {}
      - name: webapps
        emptyDir: {}
      - name: iqgeo-data
        emptyDir: {}
      - name: apache-sites
        emptyDir: {}
      - name: apache-bin
        emptyDir: {}
    extraVolumeMounts:
      - name: entrypoint-scripts
        mountPath: /entrypoint.d
      - name: webapps
        mountPath: /opt/iqgeo/platform/WebApps
      - name: iqgeo-data
        mountPath: /opt/iqgeo/data
      - name: apache-sites
        mountPath: /etc/apache2/sites-enabled
      - name: apache-bin
        mountPath: /usr/sbin/apache2
        subPath: apache2
    resources:
      limits:
        cpu: "1"
        memory: 2Gi
      requests:
        cpu: 250m
        memory: 512Mi
    autoscaling:
      enabled: false

redis:
  enabled: true
  master:
    count: 1
    resources:
      limits:
        cpu: 500m
        memory: 1Gi
      requests:
        cpu: 100m
        memory: 256Mi
    persistence:
      storageClass: "ontap-nas-ssd"
      size: 8Gi
    podSecurityContext:
      enabled: false
    containerSecurityContext:
      enabled: false

cronjob:
  enabled: true
  resources:
    limits:
      cpu: "1"
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 256Mi

cronjobs:
  maintain:
    schedule: "30 03 * * *"
    commandRef: maintain
    deadlineSeconds: 4800
    startingDeadlineSeconds: 300
    backoffLimit: 3
    maintains: "transaction_logs usage_stats replicas statistics"
    includeSharedData: false
  dbVacuum:
    schedule: "30 05 * * 6"
    commandRef: dbVacuum
    deadlineSeconds: 4800
    startingDeadlineSeconds: 300
    backoffLimit: 3
    includeSharedData: false
  replicationExport:
    enabled: false
  replicationExportWithCode:
    enabled: false
  realignExtracts:
    enabled: false

podSecurityContext:
  runAsNonRoot: true

securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
  capabilities:
    drop:
      - ALL

extraPodEnv:
  - name: SEND_ERROR_LOG_TO_STDERR
    value: 'YES'
  - name: SEND_ACCESS_LOG_TO_STDOUT
    value: 'YES'
  - name: APACHE_TIMEOUT
    value: '1200'

serviceAccount:
  create: true
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 80
