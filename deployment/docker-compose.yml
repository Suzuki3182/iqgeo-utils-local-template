services:
    postgis:
        image: ghcr.io/iqgeo/docker-postgis/postgis:15-3.5
        container_name: postgis_${PROJ_PREFIX:-sandbox}
        restart: always
        environment:
            PGDATA: /opt/iqgeo/data/pgdata
            POSTGRES_USER: ${DB_USERNAME:-iqgeo}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
        volumes:
            - pgdata-example:/opt/iqgeo/data/pgdata

    iqgeo-worker:
        image: ${PROJECT_REGISTRY:-harbor.delivery.iqgeo.cloud}/${PROJECT_REPOSITORY:-sandbox}/iqgeo-${PROJ_PREFIX:-sandbox}-tools:latest
        container_name: iqgeo_${PROJ_PREFIX:-sandbox}_worker
        restart: always
        depends_on:
            - postgis
            - redis
        environment:
            PGHOST: ${DB_HOST:-postgis}
            PGPORT: 5432
            PGUSER: ${DB_USERNAME:-iqgeo}
            PGPASSWORD: ${DB_PASSWORD:-password}
            MYW_DB_NAME: ${MYW_DB_NAME:-sandbox}
            MYW_DB_HOST: ${DB_HOST:-postgis}
            MYW_DB_PORT: 5432
            MYW_DB_USERNAME: ${DB_USERNAME:-iqgeo}
            MYW_DB_PASSWORD: ${DB_PASSWORD:-password}
            SQLALCHEMY_URL: postgresql://${DB_USERNAME:-iqgeo}:${DB_PASSWORD:-password}@${DB_HOST:-postgis}:5432/${MYW_DB_NAME:-sandbox}
            REDIS_PASSWORD: ${REDIS_PASSWORD:-password}
            RQ_REDIS_URL: 'redis://:$${REDIS_PASSWORD}@redis:6379/1'
            MYW_TASK_WORKERS: ${MYW_TASK_WORKERS:-1}
            MYW_TASK_QUEUES: ${MYW_TASK_QUEUES:-}
            # START CUSTOM SECTION
            # END CUSTOM SECTION

    iqgeo:
        image: ${PROJECT_REGISTRY:-harbor.delivery.iqgeo.cloud}/${PROJECT_REPOSITORY:-sandbox}/iqgeo-${PROJ_PREFIX:-sandbox}-appserver:latest
        container_name: iqgeo_${PROJ_PREFIX:-sandbox}_appserver
        restart: always
        depends_on:
            - postgis
            - keycloak
            - redis
        environment:
            ALLOW_HTTP: 'YES' # only for local testing. do not include in production or exposed environments!
            WSGI_PROCESSES: 2
            WSGI_THREADS: 4
            PGHOST: ${DB_HOST:-postgis}
            PGPORT: 5432
            PGUSER: ${DB_USERNAME:-iqgeo}
            PGPASSWORD: ${DB_PASSWORD:-password}
            MYW_DB_NAME: ${MYW_DB_NAME:-sandbox}
            MYW_DB_HOST: ${DB_HOST:-postgis}
            MYW_DB_PORT: 5432
            MYW_DB_USERNAME: ${DB_USERNAME:-iqgeo}
            MYW_DB_PASSWORD: ${DB_PASSWORD:-password}
            BEAKER_SESSION_TYPE: ${BEAKER_SESSION_TYPE:-ext:redis}
            BEAKER_SESSION_URL: ${BEAKER_SESSION_URL:-redis://:password@redis:6379/0}
            REDIS_PASSWORD: ${REDIS_PASSWORD:-password}
            REDIS_URL: 'redis://:$${REDIS_PASSWORD}@redis:6379/0'
            RQ_REDIS_URL: 'redis://:$${REDIS_PASSWORD}@redis:6379/1'
            IQGEO_HOST: ${IQGEO_HOST:-localhost}
            KEYCLOAK_URL: ${KC_PROTOCOL:-http://}${KEYCLOAK_HOST:-keycloak.local}:${KEYCLOAK_PORT:-8080}
            MYW_EXT_BASE_URL: http://${IQGEO_HOST:-localhost} # for access from other devices (e.g. iPad running anywhere)
            MYW_DB_UPGRADE: ${MYW_DB_UPGRADE:-NO} # Default to NO to prevent accidental DB upgrade on appserver start
            CENTRIFUGO_APACHE_PROXY: 'YES'
            CENTRIFUGO_HTTP_API_KEY: ${CENTRIFUGO_HTTP_API_KEY:-6b213c49-1baf-43ec-9ffd-28a69edf5514}
            CENTRIFUGO_API_URL: ${CENTRIFUGO_API_URL:-http://centrifugo:8000/api}
            OPENBAO_ADDRESS: http://openbao:${OPENBAO_PORT:-8200}
            OPENBAO_TOKEN: ${OPENBAO_TOKEN:-not_for_production_use}
            # START CUSTOM SECTION
            # END CUSTOM SECTION
        ports:
            - ${APPSERVER_PORT:-80}:8080

    keycloak:
        container_name: keycloak_${PROJ_PREFIX:-sandbox}
        image: ghcr.io/iqgeo/utils-keycloak-iqgeo/keycloak:latest
        restart: always
        command: start-dev --import-realm
        environment:
            KC_HOSTNAME: ${KEYCLOAK_HOST:-keycloak.local}
            KC_HOSTNAME_PORT: ${KEYCLOAK_PORT:-8080}
            KC_HTTP_PORT: ${KEYCLOAK_PORT:-8080}
            KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
            KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-not_for_production_use}
            KC_PROXY: edge
            IQGEO_DOMAIN: http://${SERVER_NAME-localhost}:${APPSERVER_PORT:-80}
            IQGEO_CLIENT_SECRET: qpyu1mCm8zvvKTXRnKxwap1A6xMChuY6
            SSL_REQUIRED: none # only for local testing with self-signed certs. do not include in production or exposed environments!
        ports:
            - ${KC_HTTPS_PORT:-8443}:${KC_HTTPS_PORT:-8443}
            - ${KEYCLOAK_PORT:-8080}:${KEYCLOAK_PORT:-8080}
        networks:
            default:
                aliases:
                    - keycloak.local

    redis:
        container_name: redis_${PROJ_PREFIX:-sandbox}
        image: redis:latest
        restart: always
        command: redis-server --requirepass ${REDIS_PASSWORD:-password}

    openbao:
        profiles: ['disabled']
        image: openbao/openbao:latest
        restart: always
        container_name: openbao_${PROJ_PREFIX:-sandbox}
        ports:
            - ${OPENBAO_PORT:-8200}:${OPENBAO_PORT:-8200}
        environment:
            OPENBAO_DEV_ROOT_TOKEN_ID: ${OPENBAO_TOKEN:-not_for_production_use}
            OPENBAO_DEV_LISTEN_ADDRESS: 0.0.0.0:${OPENBAO_PORT:-8200}
        cap_add:
            - IPC_LOCK
        command: server -dev -dev-root-token-id="${OPENBAO_TOKEN:-not_for_production_use}"
        
    centrifugo:
        profiles: ['disabled']
        image: centrifugo/centrifugo:v6
        container_name: centrifugo_${PROJ_PREFIX:-sandbox}
        restart: unless-stopped
        ports:
            - ${CENTRIFUGO_PORT:-8000}:8000
        command: centrifugo
        environment:
            CENTRIFUGO_ADMIN_PASSWORD: ${CENTRIFUGO_ADMIN_PASSWORD:-not_for_production_use}
            CENTRIFUGO_HTTP_API_KEY: ${CENTRIFUGO_HTTP_API_KEY:-6b213c49-1baf-43ec-9ffd-28a69edf5514}
            CENTRIFUGO_ADMIN_SECRET: ${CENTRIFUGO_ADMIN_SECRET:-VJaNwhRxcO6T26Dk5YD}
            CENTRIFUGO_WEBSOCKET_HANDLER_PREFIX: ${CENTRIFUGO_WEBSOCKET_HANDLER_PREFIX:-/modules/notification_manager/websocket}
            CENTRIFUGO_CLIENT_ALLOWED_ORIGINS: ${CENTRIFUGO_CLIENT_ALLOWED_ORIGINS:-*}
            CENTRIFUGO_CLIENT_PROXY_CONNECT_ENABLED: ${CENTRIFUGO_CLIENT_PROXY_CONNECT_ENABLED:-true}
            CENTRIFUGO_CLIENT_PROXY_CONNECT_ENDPOINT: ${CENTRIFUGO_CLIENT_PROXY_CONNECT_ENDPOINT:-http://iqgeo:8080/modules/notification_manager/api/v1/authorize}
            CENTRIFUGO_CLIENT_PROXY_CONNECT_HTTP_HEADERS: ${CENTRIFUGO_CLIENT_PROXY_CONNECT_HTTP_HEADERS:-Cookie X-CSRF-Token}
            CENTRIFUGO_SWAGGER_ENABLED: ${CENTRIFUGO_SWAGGER_ENABLED:-true}
            CENTRIFUGO_ADMIN_ENABLED: ${CENTRIFUGO_ADMIN_ENABLED:-true}
            CENTRIFUGO_DEBUG_ENABLED: ${CENTRIFUGO_DEBUG_ENABLED:-true}
            CENTRIFUGO_LOG_LEVEL: ${CENTRIFUGO_LOG_LEVEL:-trace}
    # START CUSTOM SECTION
    # END CUSTOM SECTION

volumes:
    pgdata-example:
        name: ${PROJ_PREFIX:-sandbox}_pgdata-example15
        # START CUSTOM SECTION
        # END CUSTOM SECTION
